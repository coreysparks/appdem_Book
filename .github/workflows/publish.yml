name: Publish Book to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.0'
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libfontconfig1-dev libharfbuzz-dev libfribidi-dev libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::arrow
            any::haven
            any::tidyverse
            any::survey
            any::srvyr
            any::sf
            any::tmap
            any::car
            any::survival
            any::knitr
            any::kableExtra
            any::ggplot2
            any::dplyr
            any::readr
            any::forcats
            any::pander
            any::MASS
            any::VGAM
            any::betareg
            any::broom
            any::dispmod
            any::emmeans
            any::gamlss
            any::gt
            any::gtsummary
            any::ipumsr
            any::lmtest
            any::nlme
            any::patchwork
            any::sandwich
            any::sjPlot
            any::splines
            any::svyVGAM
            any::texreg
            any::tidycensus
            any::tigris

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render book
        run: quarto render

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
